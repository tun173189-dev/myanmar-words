<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f3ea" />
    <title>缅语记单词</title>
    <link rel="manifest" href="manifest.webmanifest?v=34" />
    <style>
:root {
  color-scheme: light;
  font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  background: #f7f3ea;
  color: #29251f;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(160deg, rgba(93, 131, 116, 0.18), transparent 38%),
    linear-gradient(340deg, rgba(218, 126, 84, 0.16), transparent 42%),
    #f7f3ea;
}

button {
  border: 0;
  font: inherit;
  cursor: pointer;
}

.app-shell {
  width: min(100%, 460px);
  min-height: 100vh;
  margin: 0 auto;
  padding: 12px 18px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-top: env(safe-area-inset-top);
}

.top-actions {
  display: flex;
  gap: 8px;
}

.eyebrow {
  margin: 0 0 4px;
  color: #6f665b;
  font-size: 13px;
}

h1,
h2,
p {
  margin: 0;
}

h1 {
  font-size: 23px;
  line-height: 1.15;
}

.icon-button,
.speak {
  width: 50px;
  height: 50px;
  flex: 0 0 50px;
  border-radius: 50%;
  background: #fffaf1;
  color: #3b352d;
  box-shadow: 0 8px 24px rgba(74, 56, 35, 0.12);
}

#settingsButton {
  width: 56px;
  height: 56px;
  flex-basis: 56px;
  color: #285b4e;
  font-size: 24px;
  box-shadow: 0 10px 28px rgba(47, 111, 94, 0.18);
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stats div {
  min-height: 60px;
  padding: 10px 12px;
  border: 1px solid rgba(77, 66, 52, 0.1);
  border-radius: 8px;
  background: rgba(255, 250, 241, 0.78);
}

.stats span {
  display: block;
  font-size: 22px;
  font-weight: 750;
  line-height: 1.1;
}

.stats small {
  display: block;
  margin-top: 6px;
  color: #72685d;
  font-size: 12px;
}

.learning-overview {
  display: grid;
  gap: 6px;
  padding: 10px 12px;
  border: 1px solid rgba(77, 66, 52, 0.08);
  border-radius: 8px;
  background: rgba(255, 250, 241, 0.58);
  color: #5e554b;
  font-size: 13px;
  font-weight: 700;
}

.learning-overview p {
  margin: 0;
}

.test-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.test-entry {
  min-height: 44px;
  border-radius: 8px;
  background: #2a2f45;
  color: white;
  font-weight: 750;
}

.listen-entry {
  grid-column: 1 / -1;
  background: #2f6f5e;
}

.story-entry {
  grid-column: 1 / -1;
  background: #6b5944;
}

.settings-panel {
  padding: 16px;
  border: 1px solid rgba(77, 66, 52, 0.1);
  border-radius: 8px;
  background: rgba(255, 250, 241, 0.86);
  display: grid;
  gap: 16px;
  box-shadow: 0 18px 50px rgba(72, 52, 30, 0.14);
}

.settings-group {
  display: grid;
  gap: 12px;
}

.setting-row,
.toggle-row {
  min-height: 46px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(77, 66, 52, 0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  color: #3b352d;
  font-weight: 700;
}

.setting-row:last-child,
.toggle-row:last-child {
  border-bottom: 0;
}

select {
  min-width: 154px;
  min-height: 38px;
  padding: 0 10px;
  border: 1px solid rgba(77, 66, 52, 0.16);
  border-radius: 8px;
  background: white;
  color: #29251f;
  font: inherit;
}

input[type="checkbox"] {
  width: 22px;
  height: 22px;
  accent-color: #2f6f5e;
}

.card-area {
  display: grid;
  min-height: clamp(240px, 34vh, 320px);
}

.word-card {
  width: 100%;
  min-height: clamp(240px, 34vh, 320px);
  padding: 22px 20px;
  border-radius: 8px;
  background: #fffaf1;
  color: #2b261f;
  box-shadow: 0 18px 50px rgba(72, 52, 30, 0.16);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
}

.word-type-badge {
  padding: 5px 10px;
  border-radius: 999px;
  background: #e5efe9;
  color: #285b4e;
  font-size: 12px;
  font-weight: 800;
}

.card-hint {
  color: #8d8174;
  font-size: 13px;
}

.word {
  max-width: 100%;
  font-size: 40px;
  font-weight: 800;
  line-height: 1.18;
  overflow-wrap: anywhere;
}

.phonetic {
  color: #6d6257;
  font-size: 17px;
  line-height: 1.45;
}

.meaning {
  font-size: 22px;
  font-weight: 700;
}

.example,
.example-cn {
  max-width: 100%;
  color: #51483f;
  font-size: 16px;
  line-height: 1.55;
}

.example-cn {
  color: #7a7065;
}

.example-tools {
  margin-top: 4px;
}

.mini-speak {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 14px;
  border-radius: 999px;
  background: #e5efe9;
  color: #285b4e;
  font-size: 14px;
  font-weight: 750;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 56px 1fr;
  align-items: center;
  gap: 10px;
}

.audio-status {
  min-height: 18px;
  margin: -8px 0 0;
  color: #7a7065;
  font-size: 13px;
  text-align: center;
}

.primary,
.secondary {
  min-height: 50px;
  padding: 0 18px;
  border-radius: 8px;
  font-weight: 750;
}

.primary {
  background: #2f6f5e;
  color: white;
}

.secondary {
  background: #ead8cb;
  color: #4a3027;
}

.full {
  width: 100%;
}

.review-panel,
.done-panel {
  padding: 20px;
  border-radius: 8px;
  background: #fffaf1;
  box-shadow: 0 14px 36px rgba(72, 52, 30, 0.12);
  display: grid;
  gap: 14px;
}

.review-panel h2,
.done-panel h2 {
  font-size: 24px;
}

.review-panel p,
.done-panel p {
  color: #61584f;
}

.review-actions,
.done-actions {
  display: grid;
  gap: 10px;
}

.listen-primary {
  background: #2a2f45;
}

button:disabled {
  opacity: 0.48;
  cursor: not-allowed;
}

.test-panel,
.story-panel {
  padding: 16px;
  border-radius: 8px;
  background: #fffaf1;
  box-shadow: 0 18px 50px rgba(72, 52, 30, 0.16);
  display: grid;
  gap: 14px;
}

.test-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.test-word {
  font-size: 38px;
  font-weight: 800;
  line-height: 1.16;
  text-align: center;
  overflow-wrap: anywhere;
}

.test-speak {
  justify-self: center;
  min-height: 42px;
  padding: 0 16px;
  border-radius: 999px;
  background: #e5efe9;
  color: #285b4e;
  font-size: 14px;
  font-weight: 750;
}

.test-audio-button {
  width: min(100%, 240px);
  min-height: 52px;
  border-radius: 8px;
  background: #dceee6;
  color: #205345;
  font-size: 17px;
  box-shadow: 0 10px 24px rgba(47, 111, 94, 0.12);
}

.choice-list {
  display: grid;
  gap: 10px;
}

.choice {
  min-height: 52px;
  padding: 12px 14px;
  border-radius: 8px;
  background: #efe7dc;
  color: #302a23;
  font-weight: 700;
  text-align: left;
}

.choice.correct {
  background: #dceee6;
  color: #285b4e;
}

.choice.wrong {
  background: #efd7ce;
  color: #7a3326;
}

.test-feedback {
  min-height: 22px;
  color: #61584f;
  text-align: center;
}

.story-list {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
}

.story-chip {
  min-height: 36px;
  padding: 0 12px;
  border-radius: 999px;
  background: #efe7dc;
  color: #4d4137;
  font-size: 13px;
  font-weight: 750;
  white-space: nowrap;
}

.story-chip.active {
  background: #2f6f5e;
  color: white;
}

.story-card {
  min-height: 168px;
  padding: 14px;
  border-radius: 8px;
  background: #f3eadf;
  display: grid;
  align-content: center;
  gap: 12px;
  text-align: center;
}

.story-progress {
  color: #756a60;
  font-size: 14px;
  font-weight: 700;
}

.story-sentence {
  color: #27231e;
  font-size: 26px;
  font-weight: 800;
  line-height: 1.28;
  overflow-wrap: anywhere;
}

.story-cn {
  color: #62574d;
  font-size: 17px;
  line-height: 1.5;
}

.story-toolbar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.story-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.hidden {
  display: none !important;
}

@media (max-width: 360px) {
  .app-shell {
    padding-inline: 14px;
    gap: 9px;
  }

  h1 {
    font-size: 21px;
  }

  .word {
    font-size: 34px;
  }

  .card-area,
  .word-card {
    min-height: 230px;
  }

  .story-sentence {
    font-size: 24px;
  }

  .story-card {
    min-height: 150px;
  }
}

@media (max-height: 760px) {
  .app-shell {
    gap: 8px;
    padding-block: 10px 18px;
  }

  .stats div {
    min-height: 54px;
    padding: 8px 10px;
  }

  .stats span {
    font-size: 20px;
  }

  .test-entry {
    min-height: 42px;
  }

  .card-area,
  .word-card {
    min-height: 230px;
  }

  .word-card {
    padding: 18px;
  }

  .word {
    font-size: 34px;
  }

  .phonetic {
    font-size: 15px;
  }

  .primary,
  .secondary {
    min-height: 48px;
  }
}
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" id="homeTopbar">
        <div>
          <p class="eyebrow">缅语记单词</p>
          <h1 id="todayTitle">今天</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="settingsButton" type="button" aria-label="设置" title="设置">⚙</button>
        </div>
      </header>

      <section class="stats" aria-label="今日进度">
        <div>
          <span id="progressText">0 / 10</span>
          <small id="progressLabel">今日进度</small>
        </div>
        <div>
          <span id="streakText">0 天</span>
          <small>连续学习</small>
        </div>
      </section>

      <section class="learning-overview" id="learningOverview" aria-label="学习进度">
        <p id="learnedTotalText">总进度 0 / 1000</p>
        <p id="todayMixText">今日：新词 0，复习 0</p>
      </section>

      <section class="review-panel hidden" id="weeklyReviewPanel" aria-live="polite">
        <p class="eyebrow">复习提醒</p>
        <h2 id="weeklyReviewTitle">本周该复习了</h2>
        <p id="weeklyReviewSummary">这段时间学了 0 个词，先完整复习一遍，再做小测。</p>
        <div class="review-actions">
          <button class="primary full" id="weeklyReviewButton" type="button">开始本周复习</button>
          <button class="primary full listen-primary" id="weeklyTestDueButton" type="button">开始本周小测</button>
          <button class="secondary full" id="weakReviewButton" type="button">复习没掌握的词</button>
        </div>
      </section>

      <section class="done-panel hidden" id="donePanel" aria-live="polite">
        <h2>今天完成了</h2>
        <p id="summaryText">认识 0 个，不认识 0 个。</p>
        <div class="done-actions">
          <button class="primary full" id="reviewTodayButton" type="button">今天再复习</button>
          <button class="primary full listen-primary" id="listenTodayButton" type="button">今天测试</button>
          <button class="secondary full" id="reviewAgainButton" type="button">复习错词</button>
        </div>
      </section>

      <div class="test-actions">
        <button class="test-entry listen-entry" id="startListeningTestButton" type="button">听力小测</button>
        <button class="test-entry story-entry" id="startStoryButton" type="button">听力短句练习</button>
      </div>

      <section class="settings-panel hidden" id="settingsPanel" aria-label="设置">
        <div class="test-head">
          <div>
            <p class="eyebrow">设置</p>
            <h2>学习偏好</h2>
          </div>
          <button class="icon-button" id="closeSettingsButton" type="button" aria-label="返回首页" title="返回首页">×</button>
        </div>
        <div class="settings-group">
          <div class="setting-row">
            <label for="dailyCountSelect">每天单词</label>
            <select id="dailyCountSelect">
              <option value="10">10 个</option>
              <option value="15">15 个</option>
              <option value="20">20 个</option>
              <option value="30">30 个</option>
              <option value="50">50 个</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="categorySelect">练习场景</label>
            <select id="categorySelect">
              <option value="all">全部场景</option>
              <option value="基础日常">基础日常</option>
              <option value="政府办事">政府办事</option>
              <option value="银行支付">银行支付</option>
              <option value="手机通信">手机通信</option>
              <option value="医疗药店">医疗药店</option>
              <option value="住宿租房">住宿租房</option>
              <option value="交通出行">交通出行</option>
              <option value="购物吃饭">购物吃饭</option>
              <option value="工作社交">工作社交</option>
              <option value="紧急情况">紧急情况</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="learningLanguageSelect">学习语言</label>
            <select id="learningLanguageSelect">
              <option value="zh">中文学缅语</option>
              <option value="en">English to Myanmar</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="testIntervalSelect">小测间隔</label>
            <select id="testIntervalSelect">
              <option value="7">7 天</option>
              <option value="10">10 天</option>
              <option value="14">14 天</option>
            </select>
          </div>
          <label class="toggle-row">
            <input id="autoSpeakToggle" type="checkbox" />
            <span>自动朗读</span>
          </label>
          <label class="toggle-row">
            <input id="notificationToggle" type="checkbox" />
            <span>学习提醒</span>
          </label>
        </div>
      </section>

      <section class="card-area">
        <button class="word-card" id="cardButton" type="button" aria-label="点击显示中文">
          <span class="word-type-badge" id="wordTypeBadge">新词</span>
          <span class="card-hint" id="cardHint">点击显示中文</span>
          <span class="word" id="wordText">မင်္ဂလာပါ</span>
          <span class="phonetic" id="phoneticText"></span>
          <span class="meaning hidden" id="meaningText"></span>
          <span class="example hidden" id="exampleText"></span>
          <span class="example-cn hidden" id="exampleCnText"></span>
          <span class="example-tools hidden" id="exampleTools">
            <span class="mini-speak" id="speakExampleButton" role="button" tabindex="0">朗读例句</span>
          </span>
        </button>
      </section>

      <section class="actions" aria-label="学习操作">
        <button class="secondary" id="unknownButton" type="button">不认识</button>
        <button class="speak" id="speakButton" type="button" aria-label="朗读单词" title="朗读">🔊</button>
        <button class="primary" id="knownButton" type="button">认识</button>
      </section>
      <p class="audio-status" id="audioStatus" aria-live="polite"></p>

      <section class="test-panel hidden" id="testPanel" aria-live="polite">
        <div class="test-head">
          <div>
            <p class="eyebrow" id="testTitleText">小测</p>
            <h2 id="testProgressText">1 / 10</h2>
          </div>
          <button class="icon-button" id="closeTestButton" type="button" aria-label="退出小测" title="退出小测">×</button>
        </div>
        <p class="test-word" id="testWordText">မင်္ဂလာပါ</p>
        <button class="test-speak test-audio-button" id="speakTestButton" type="button">🔊 再听一遍</button>
        <button class="test-speak hidden" id="showTestWordButton" type="button">显示文字</button>
        <div class="choice-list" id="choiceList"></div>
        <p class="test-feedback" id="testFeedback"></p>
      </section>

      <section class="story-panel hidden" id="storyPanel" aria-live="polite">
        <div class="test-head">
          <div>
            <p class="eyebrow">听力短句练习</p>
            <h2 id="storyTitle">办事对话</h2>
          </div>
          <button class="icon-button" id="closeStoryButton" type="button" aria-label="退出听力短句练习" title="退出听力短句练习">×</button>
        </div>
        <div class="story-list" id="storyList" aria-label="选择故事"></div>
        <div class="story-card">
          <p class="story-progress" id="storyProgressText">1 / 8</p>
          <p class="story-sentence" id="storySentenceText">မင်္ဂလာပါ။</p>
          <p class="story-cn hidden" id="storyCnText">你好。</p>
        </div>
        <div class="story-toolbar">
          <button class="test-speak" id="storySlowButton" type="button">慢速听一遍</button>
          <button class="test-speak" id="storyShowCnButton" type="button">显示中文</button>
        </div>
        <div class="story-controls">
          <button class="secondary" id="storyPrevButton" type="button">上一句</button>
          <button class="primary" id="storyPlayButton" type="button">暂停</button>
          <button class="secondary" id="storyReplayButton" type="button">再听一遍</button>
          <button class="primary" id="storyNextButton" type="button">下一句</button>
        </div>
        <p class="test-feedback" id="storyStatus">逐句听，听不懂就重听</p>
      </section>
    </main>

    <script>
window.WORDS = [
  { id: 1, word: "မင်္ဂလာပါ", phonetic: "mingalaba", meaning: "你好", example: "မင်္ဂလာပါ၊ ကျွန်တော် အကူအညီ လိုပါတယ်။", exampleCn: "你好，我需要帮助。" },
  { id: 2, word: "ကျေးဇူးတင်ပါတယ်", phonetic: "ce zu tin ba de", meaning: "谢谢", example: "သင့်အကူအညီအတွက် ကျေးဇူးတင်ပါတယ်။", exampleCn: "谢谢你的帮助。" },
  { id: 3, word: "တောင်းပန်ပါတယ်", phonetic: "taung pan ba de", meaning: "对不起", example: "နောက်ကျသွားလို့ တောင်းပန်ပါတယ်။", exampleCn: "我迟到了，对不起。" },
  { id: 4, word: "ဟုတ်ကဲ့", phonetic: "hou ke", meaning: "是的 / 好的", example: "ဟုတ်ကဲ့၊ နားလည်ပါတယ်။", exampleCn: "好的，我明白了。" },
  { id: 5, word: "မဟုတ်ပါဘူး", phonetic: "ma hou ba bu", meaning: "不是", example: "ဒါ ကျွန်တော့်စာရွက် မဟုတ်ပါဘူး။", exampleCn: "这不是我的文件。" },
  { id: 6, word: "နားလည်ပါတယ်", phonetic: "na le ba de", meaning: "明白", example: "သင်ပြောတာ နားလည်ပါတယ်။", exampleCn: "我明白你说的话。" },

function loadState() {
  var fallback = {
    records: {},
    days: {},
    tests: [],
    settings: Object.assign({}, DEFAULT_SETTINGS),
    lastStudyDate: "",
    streak: 0,
    weeklyReviewThrough: "",
    lastWeeklyReviewIds: [],
    lastWeeklyReviewDate: "",
    activeReview: null
  };
  var saved = null;
  try {
    saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  } catch (error) {
    saved = null;
  }
  if (!saved) return fallback;

  saved.records = saved.records || {};
  saved.days = saved.days || {};
  saved.tests = saved.tests || [];
  saved.settings = saved.settings || {};
  saved.settings.dailyCount = Number(saved.settings.dailyCount || DEFAULT_SETTINGS.dailyCount);
  saved.settings.testInterval = Number(saved.settings.testInterval || DEFAULT_SETTINGS.testInterval);
  saved.settings.autoSpeak = saved.settings.autoSpeak !== false;
  saved.settings.category = saved.settings.category || DEFAULT_SETTINGS.category;
  saved.settings.learningLanguage = saved.settings.learningLanguage || DEFAULT_SETTINGS.learningLanguage;
  saved.settings.notifications = saved.settings.notifications === true;
  saved.lastStudyDate = saved.lastStudyDate || "";
  saved.streak = saved.streak || 0;
  saved.weeklyReviewThrough = saved.weeklyReviewThrough || "";
  saved.lastWeeklyReviewIds = saved.lastWeeklyReviewIds || [];
  saved.lastWeeklyReviewDate = saved.lastWeeklyReviewDate || "";
  saved.activeReview = saved.activeReview && saved.activeReview.ids && saved.activeReview.ids.length ? saved.activeReview : null;
  if (saved.activeReview) {
    saved.activeReview.answers = saved.activeReview.answers || {};
    saved.activeReview.type = saved.activeReview.type || "review";
    saved.activeReview.sourceThrough = saved.activeReview.sourceThrough || "";
  }
  return saved;
}

  var learned = [];
  var wordPool = getSelectedWords();
  for (var i = 0; i < wordPool.length; i += 1) {
    var word = wordPool[i];
    var record = state.records[word.id];
    if (record && record.reviewAfter && record.reviewAfter <= today) due.push(word);
    else if (!record) fresh.push(word);
    else learned.push(word);
  }

  var candidates = toTypedWords(due, "review").concat(toTypedWords(fresh, "new")).concat(toTypedWords(learned, "review"));
  var picked = candidates.slice(0, state.settings.dailyCount);
  state.days[today] = { ids: getTypedIds(picked), sources: getTypedSources(picked), answers: {}, completed: false };
  saveState();
  return mapTypedWords(picked);
}

function getIds(words) {
  var ids = [];
  for (var i = 0; i < words.length; i += 1) ids.push(words[i].id);
  return ids;
}

function toTypedWords(words, type) {
  var typed = [];
  for (var i = 0; i < words.length; i += 1) typed.push({ word: words[i], type: type });
  return typed;
}

function mapTypedWords(typed) {
  var words = [];
  for (var i = 0; i < typed.length; i += 1) words.push(typed[i].word);
  return words;
}

function getTypedIds(typed) {
  var ids = [];
  for (var i = 0; i < typed.length; i += 1) ids.push(typed[i].word.id);
  return ids;
}

function getTypedSources(typed) {
  var sources = {};
  for (var i = 0; i < typed.length; i += 1) sources[typed[i].word.id] = typed[i].type;
  return sources;
}

function mapIdsToWords(ids) {
  var words = [];
  for (var i = 0; i < ids.length; i += 1) {
    var word = findWord(ids[i]);
    if (word) words.push(word);
  }
  return words;
}

function findWord(id) {
  for (var i = 0; i < WORDS.length; i += 1) {
    if (WORDS[i].id === Number(id)) return WORDS[i];
  }
  return null;
}

function renderCard() {
  if (test.active || storyState.active) return;

  var day = state.days[today];
  var current = session[index];
  var answers = reviewMode && reviewSession ? reviewSession.answers : (day && day.answers ? day.answers : {});
  var answeredCount = Object.keys(answers).length;
  var progressCount = reviewMode ? index : Math.min(answeredCount, session.length);
  els.progressText.textContent = String(progressCount) + " / " + String(session.length);
  if (els.progressLabel) els.progressLabel.textContent = reviewMode ? getReviewLabel() : "今日进度";

  if (!current || (day && day.completed && !reviewMode)) {
    toggleHidden(els.cardButton, true);
    toggleHidden(document.querySelector(".actions"), true);
    var progress = getTodayProgressStats();
    var wrongIds = progress.needsReviewIds;
    els.summaryText.textContent = progress.needsReview
      ? "今日掌握 " + progress.mastered + " 个，还有 " + progress.needsReview + " 个需要复习。"
      : "今日掌握 " + progress.mastered + " 个，今天没有需要复习的词。";
    if (els.reviewAgainButton) {
      els.reviewAgainButton.textContent = wrongIds.length ? "复习错词 " + wrongIds.length : "今天没有错词";
      els.reviewAgainButton.disabled = !wrongIds.length;

  }

  els.exampleCnText.textContent = current.exampleCn;
  els.cardHint.textContent = flipped ? "点击收起中文" : "点击显示中文";

  toggleHidden(els.meaningText, !flipped);
  toggleHidden(els.exampleText, !flipped);
  toggleHidden(els.exampleCnText, !flipped);
  toggleHidden(els.exampleTools, !flipped);
  if (learningAutoSpeakArmed || reviewMode) autoSpeak("learn-" + current.id + "-" + index, current.word);
}

function answer(isKnown) {
  var current = session[index];
  if (!current) return;
  learningAutoSpeakArmed = true;
  updateRecord(current, isKnown);
  if (reviewMode && reviewSession) {
    reviewSession.answers[current.id] = isKnown;
    state.activeReview = reviewSession;
  } else {
    ensureTodayDay();
    state.days[today].answers[current.id] = isKnown;
  }
  updateStreak();
  index += 1;
  flipped = false;
  if (index >= session.length) {
    if (reviewMode && reviewSession) {
      finishReview();
      render();
      return;
    }
    state.days[today].completed = true;
  }
  saveState();
  render();
}

function updateRecord(word, isKnown) {
  var oldRecord = state.records[word.id] || { level: 0 };
  var level = isKnown ? Math.min((oldRecord.level || 0) + 1, 4) : 0;
  var daysLater = isKnown ? [0, 3, 7, 15, 30][level] : 1;
  state.records[word.id] = { level: level, lastSeen: today, reviewAfter: addDays(today, daysLater) };
}

function getTestPool() {
  var source = getWeeklyReviewSource();
  var reviewedToday = state.lastWeeklyReviewDate === today ? state.lastWeeklyReviewIds : [];
  var preferredIds = source.ids.length ? source.ids : reviewedToday;
  var studied = preferredIds.length ? mapIdsToWords(preferredIds) : [];
  if (!studied.length) {
    var wordPool = getSelectedWords();
    for (var i = 0; i < wordPool.length; i += 1) {
      if (state.records[wordPool[i].id]) studied.push(wordPool[i]);
    }
  }
  var candidates = studied.length >= TEST_COUNT ? studied : session.slice();
  candidates.sort(function (a, b) {
    var recordA = state.records[a.id] || { level: 0, lastSeen: "" };
    var recordB = state.records[b.id] || { level: 0, lastSeen: "" };
    if ((recordA.level || 0) !== (recordB.level || 0)) return (recordA.level || 0) - (recordB.level || 0);
    return String(recordA.lastSeen || "").localeCompare(String(recordB.lastSeen || ""));
  });
  return candidates.slice(0, TEST_COUNT);
}

function isTestDue() {
  var lastTest = state.tests[state.tests.length - 1];
  var lastTestDate = lastTest ? lastTest.date : "";
  var completed = 0;
  for (var date in state.days) {
    if (Object.prototype.hasOwnProperty.call(state.days, date)) {
      if (state.days[date].completed && (!lastTestDate || date > lastTestDate)) completed += 1;
    }
  }
  return completed >= state.settings.testInterval;
}

function updateSettings() {
  var oldDailyCount = state.settings.dailyCount;
  var oldCategory = state.settings.category || DEFAULT_SETTINGS.category;
  state.settings.dailyCount = Number(els.dailyCountSelect.value);
  state.settings.testInterval = Number(els.testIntervalSelect.value);
  state.settings.category = els.categorySelect.value || DEFAULT_SETTINGS.category;
  state.settings.learningLanguage = els.learningLanguageSelect.value || DEFAULT_SETTINGS.learningLanguage;
  state.settings.autoSpeak = els.autoSpeakToggle.checked;
  state.settings.notifications = els.notificationToggle.checked;

  var answers = state.days[today] && state.days[today].answers ? state.days[today].answers : {};
  if ((oldDailyCount !== state.settings.dailyCount || oldCategory !== state.settings.category) && Object.keys(answers).length === 0) {
    delete state.days[today];
    session = buildSession();
    index = 0;
    flipped = false;
    learningAutoSpeakArmed = false;
  }
  saveState();
  render();
}

function makeQuestion(word) {
  var wrongChoices = [];
  var pool = getSelectedWords();
  if (pool.length < 4) pool = WORDS.slice();
  pool.sort(function () { return Math.random() - 0.5; });
  for (var i = 0; i < pool.length && wrongChoices.length < 3; i += 1) {
    if (pool[i].id !== word.id) wrongChoices.push(pool[i]);
  }
  var choices = [word].concat(wrongChoices);
  choices.sort(function () { return Math.random() - 0.5; });
  return { word: word, choices: choices, answerId: word.id };
}

function renderTest() {
  if (!test.active) return;
  var question = test.questions[test.index];
  if (!question) {
    finishTest();
    return;
  }
  if (els.testTitleText) els.testTitleText.textContent = test.title || "小测";
  els.testProgressText.textContent = String(test.index + 1) + " / " + String(test.questions.length);
  els.testWordText.textContent = test.listening && !test.showWord ? "听发音，选择意思" : question.word.word;
  els.speakTestButton.textContent = test.listening ? "🔊 再听一遍" : "🔊 朗读单词";
  toggleHidden(els.showTestWordButton, !test.listening || test.showWord);
  if (!test.answered) els.testFeedback.textContent = "";
  els.choiceList.innerHTML = "";

  for (var i = 0; i < question.choices.length; i += 1) {
    appendChoiceButton(question.choices[i]);
  }
  if (test.listening) forceAutoSpeak("listen-" + question.word.id + "-" + test.index, question.word.word);
  else autoSpeak("test-" + question.word.id + "-" + test.index, question.word.word);
}

function renderStory() {

  var story = getCurrentStory();
  var line = getCurrentStoryLine();
  renderStoryList();
  if (!story || !line) return;
  els.storyTitle.textContent = story.title;
  els.storyProgressText.textContent = String(storyState.lineIndex + 1) + " / " + String(story.lines.length);
  els.storySentenceText.textContent = line.my;
  els.storyCnText.textContent = line.cn;

  renderStoryPlayButton();
  els.storyPrevButton.disabled = storyState.lineIndex <= 0;
  els.storyNextButton.disabled = storyState.lineIndex >= story.lines.length - 1;
  if (!storyState.playing && !els.storyStatus.textContent) els.storyStatus.textContent = "逐句听，听不懂就重听";
}

function renderStoryList() {
  els.storyList.innerHTML = "";
  var stories = window.LISTENING_STORIES || [];
  for (var i = 0; i < stories.length; i += 1) {
    appendStoryButton(stories[i], i);
  }
}

function appendStoryButton(story, storyIndex) {
  var button = document.createElement("button");
  button.className = "story-chip";
  button.type = "button";
  button.textContent = story.title;
  button.classList.toggle("active", storyIndex === storyState.storyIndex);
  button.addEventListener("click", function () {
    pauseStoryAudio();
    storyState.storyIndex = storyIndex;
    storyState.lineIndex = 0;
    storyState.showCn = false;
    storyState.playState = "idle";
    renderStory();
    playStoryLine(true, 1);
  });
  els.storyList.appendChild(button);
}

function getCurrentStory() {
  var stories = window.LISTENING_STORIES || [];
  return stories[storyState.storyIndex] || stories[0];
}

function getCurrentStoryLine() {
  var story = getCurrentStory();
  if (!story || !story.lines || !story.lines.length) return null;
  return story.lines[storyState.lineIndex] || story.lines[0];
}

function toggleStoryPlay() {
  if (storyState.audio && storyState.playing) {
    storyState.audio.pause();
    storyState.playing = false;
    storyState.playState = "paused";
    renderStory();
    return;
  }
  if (storyState.audio && !storyState.playing && storyState.playState === "paused") {
    storyState.audio.play().catch(function () {
      setStoryStatus("播放失败，请检查网络或声音权限");
      storyState.playState = "failed";
      renderStory();
    });
    storyState.playing = true;
    storyState.playState = "playing";
    renderStory();
    return;
  }
  if (storyState.playState === "idle" || storyState.playState === "failed") {
    playStoryLine(true, 1);
  }
}

function replayStoryLine() {
  playStoryLine(true, 1);
}

function playStoryLineSlow() {
  playStoryLine(true, 0.75);
}

function playStoryLine(restart, rate) {
  var line = getCurrentStoryLine();
  if (!line) return;
  if (restart) pauseStoryAudio();
  storyState.playState = "loading";
  setStoryStatus("正在准备发音");
  storyState.audio = playOnlineMyanmarAudio(line.my, function () {
    storyState.playing = false;
    storyState.playState = "failed";
    setStoryStatus("自动播放失败，请点继续");
    renderStory();
  }, {
    rate: rate || 1,
    timeoutMs: 9000,
    onPlaying: function () {
      storyState.playing = true;
      storyState.playState = "playing";
      setStoryStatus((rate || 1) < 1 ? "慢速朗读" : "正在朗读");
      renderStory();
    },
    onEnded: function () {
      storyState.playing = false;
      storyState.audio = null;
      storyState.playState = "ended";
      setStoryStatus("逐句听，听不懂就重听");
      renderStory();
    }
  });
}

function previousStoryLine() {
  if (storyState.lineIndex <= 0) return;
  pauseStoryAudio();
  storyState.lineIndex -= 1;
  storyState.showCn = false;
  storyState.playState = "idle";
  renderStory();
  playStoryLine(true, 1);
}

function nextStoryLine() {
  var story = getCurrentStory();
  if (!story || storyState.lineIndex >= story.lines.length - 1) return;
  pauseStoryAudio();
  storyState.lineIndex += 1;
  storyState.showCn = false;
  storyState.playState = "idle";
  renderStory();
  playStoryLine(true, 1);
}

function toggleStoryChinese() {
  storyState.showCn = !storyState.showCn;
  renderStory();
}

function pauseStoryAudio() {
  if (storyState.audio) {
    storyState.audio.pause();
    if (currentAudio === storyState.audio) currentAudio = null;
    storyState.audio = null;
  }
  storyState.playing = false;
  storyState.playState = "idle";
  setStoryStatus("逐句听，听不懂就重听");
}

function renderStoryPlayButton() {
  var state = storyState.playState || "idle";
  els.storyPlayButton.disabled = false;
  if (state === "loading") {
    els.storyPlayButton.textContent = "准备中";
    els.storyPlayButton.disabled = true;
  } else if (state === "playing") {
    els.storyPlayButton.textContent = "暂停";
  } else if (state === "paused" || state === "failed") {
    els.storyPlayButton.textContent = "继续";
  } else if (state === "ended") {
    els.storyPlayButton.textContent = "已播放";
    els.storyPlayButton.disabled = true;
  } else {
    els.storyPlayButton.textContent = "播放";
  }
}

function renderLearningOverview() {
  if (!els.learnedTotalText || !els.todayMixText) return;
  var category = state.settings.category || DEFAULT_SETTINGS.category;
  var pool = getSelectedWords();
  var learned = countLearnedWords(pool);
  els.learnedTotalText.textContent = category === "all"
    ? "总进度 " + learned + " / " + WORDS.length
    : "场景进度 " + learned + " / " + pool.length;

  var mix = getTodayMixStats();
  els.todayMixText.textContent = mix.hasSources
    ? "今日：新词 " + mix.newCount + "，复习 " + mix.reviewCount
    : "今日词汇 " + mix.total + " 个";
}

function countLearnedWords(words) {
  var count = 0;
  for (var i = 0; i < words.length; i += 1) {
    if (state.records[words[i].id]) count += 1;
  }
  return count;
}

function getTodayMixStats() {
  var day = state.days[today];
  if (!day || !day.ids || !day.ids.length) return { newCount: 0, reviewCount: 0, total: 0, hasSources: false };
  var sources = day.sources || {};
  var hasSources = false;
  var newCount = 0;
  var reviewCount = 0;
  for (var i = 0; i < day.ids.length; i += 1) {
    var type = sources[day.ids[i]];
    if (type) hasSources = true;
    if (type === "new") newCount += 1;
    else if (type === "review") reviewCount += 1;
  }
  return { newCount: newCount, reviewCount: reviewCount, total: day.ids.length, hasSources: hasSources };
}

function getWordTypeLabel(word) {
  if (reviewMode) return getReviewLabel();
  var day = state.days[today];
  var source = day && day.sources ? day.sources[word.id] : "";
  if (source === "new") return "新词";
  if (source === "review") return "复习";
  return "今日词汇";
}

function setStoryStatus(text) {
  if (els.storyStatus) els.storyStatus.textContent = text || "";
}

function appendChoiceButton(choice) {
  var button = document.createElement("button");
  button.className = "choice";
  button.type = "button";
  button.textContent = choice.meaning;
  button.addEventListener("click", function () { answerTest(choice.id); });
  els.choiceList.appendChild(button);
}

function answerTest(choiceId) {
  if (test.answered) return;
  var question = test.questions[test.index];
  var correct = choiceId === question.answerId;
  test.answered = true;
  if (correct) test.score += 1;
  updateRecord(question.word, correct);

  var pickedMeaning = "";
  for (var i = 0; i < question.choices.length; i += 1) {
    if (question.choices[i].id === choiceId) pickedMeaning = question.choices[i].meaning;
  }
  var buttons = els.choiceList.querySelectorAll(".choice");
  for (var b = 0; b < buttons.length; b += 1) {
    buttons[b].classList.toggle("correct", buttons[b].textContent === question.word.meaning);
    buttons[b].classList.toggle("wrong", buttons[b].textContent === pickedMeaning && !correct);
    buttons[b].disabled = true;
  }

  els.testFeedback.textContent = correct ? "答对了" : "答错了：" + question.word.meaning;
  saveState();
  window.setTimeout(function () {
    test.index += 1;
    test.answered = false;
    test.showWord = !test.listening;
    renderTest();
  }, 850);
}

function finishTest() {
  state.tests.push({ date: today, score: test.score, total: test.questions.length });
  saveState();
  els.testProgressText.textContent = "完成";
  els.testWordText.textContent = String(test.score) + " / " + String(test.questions.length);
  els.choiceList.innerHTML = "";
  els.testFeedback.textContent = test.score >= Math.ceil(test.questions.length * 0.8) ? "掌握得不错" : "错题会提前复习";
  var button = document.createElement("button");
  button.className = "primary full";
  button.type = "button";
  button.textContent = "回到今日单词";
  button.addEventListener("click", closeTest);
  els.choiceList.appendChild(button);
}

function showListeningWord() {
  if (!test.active || !test.listening) return;
  test.showWord = true;
  renderTest();
}

function updateStreak() {
  if (state.lastStudyDate === today) return;
  var yesterday = addDays(today, -1);
  state.streak = state.lastStudyDate === yesterday ? (state.streak || 0) + 1 : 1;
  state.lastStudyDate = today;
}

function addDays(dateString, amount) {
  var date = new Date(dateString + "T00:00:00");
  date.setDate(date.getDate() + amount);
  return toDateKey(date);
}

function toDateKey(date) {
  var year = date.getFullYear();
  var month = String(date.getMonth() + 1);
  var day = String(date.getDate());
  if (month.length < 2) month = "0" + month;
  if (day.length < 2) day = "0" + day;
  return year + "-" + month + "-" + day;
}

function formatToday() {
  return new Intl.DateTimeFormat("zh-CN", { month: "long", day: "numeric", weekday: "long" }).format(new Date());
}

function speakCurrentWord() {
  var current = session[index];
  if (!current) return;
  learningAutoSpeakArmed = true;
  speakText(current.word);
}

function speakCurrentTestWord() {
  var question = test.questions[test.index];
  if (!question) return;
  speakText(question.word.word);
}

function speakCurrentExample(event) {
  if (event && event.stopPropagation) event.stopPropagation();
  var current = session[index];
  if (!current) return;
  speakText(current.example);
}

function speakText(text) {
  playOnlineMyanmarAudio(text, function () {
    setAudioStatus("在线缅语发音失败，请检查网络或浏览器声音权限");
  });
}

function playOnlineMyanmarAudio(text, onFail, options) {
  if (!("Audio" in window)) {
    onFail();
    return null;
  }
  pauseCurrentAudio();
  var url = makeTtsUrl(text);
  var audio = new Audio(url);
  var settled = false;
  currentAudio = audio;
  audio.preload = "auto";
  if (options && options.rate) audio.playbackRate = options.rate;
  audio.onplaying = function () {
    if (settled) return;
    settled = true;
    setAudioStatus("在线缅语发音");
    if (options && options.onPlaying) options.onPlaying(audio);
  };
  audio.onerror = function () {
    if (settled) return;
    settled = true;
    if (currentAudio === audio) currentAudio = null;
    onFail();
  };
  audio.onended = function () {
    if (currentAudio === audio) currentAudio = null;
    if (options && options.onEnded) options.onEnded(audio);
  };
  audio.play().catch(function () {
    if (settled) return;
    settled = true;
    if (currentAudio === audio) currentAudio = null;
    onFail();
  });
  window.setTimeout(function () {
    if (settled) return;
    settled = true;
    if (currentAudio === audio) currentAudio = null;
    onFail();
  }, options && options.timeoutMs ? options.timeoutMs : 2600);
  return audio;
}

function pauseCurrentAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
}

function makeTtsUrl(text) {
  if (TTS_PROXY_URL) {
    return TTS_PROXY_URL.replace(/\/$/, "") + "?text=" + encodeURIComponent(text);
  }
  return "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=my&q=" + encodeURIComponent(text);
}

function setAudioStatus(text) {
  if (!els.audioStatus) return;
  els.audioStatus.textContent = text || "";
}

function autoSpeak(key, text) {
  if (!state.settings.autoSpeak || lastAutoSpokenKey === key) return;
  lastAutoSpokenKey = key;
  window.setTimeout(function () { speakText(text); }, 180);
}

function forceAutoSpeak(key, text) {
  if (lastAutoSpokenKey === key) return;
  lastAutoSpokenKey = key;
  window.setTimeout(function () { speakText(text); }, 180);
}

function reviewMistakes() {
  var wrongIds = getTodayNeedsReviewIds();
  if (!wrongIds.length) {
    renderCard();
    return;
  }
  startReview(wrongIds, "mistakes");
}

function getTodayWrongIds() {
  return getTodayNeedsReviewIds();
}

function getTodayNeedsReviewIds() {
  var day = state.days[today];
  if (!day || !day.ids) return [];
  var answers = day.answers || {};
  var needsReviewIds = [];
  for (var i = 0; i < day.ids.length; i += 1) {
    var id = Number(day.ids[i]);
    if (!Object.prototype.hasOwnProperty.call(answers, id)) continue;
    if (!isTodayWordMastered(id)) needsReviewIds.push(id);
  }
  return needsReviewIds;
}

function getTodayProgressStats() {
  var day = state.days[today];
  if (!day || !day.ids) return { mastered: 0, needsReview: 0, needsReviewIds: [] };
  var answers = day.answers || {};
  var mastered = 0;
  var needsReviewIds = [];
  for (var i = 0; i < day.ids.length; i += 1) {
    var id = Number(day.ids[i]);
    if (!Object.prototype.hasOwnProperty.call(answers, id)) continue;
    if (isTodayWordMastered(id)) mastered += 1;
    else needsReviewIds.push(id);
  }
  return { mastered: mastered, needsReview: needsReviewIds.length, needsReviewIds: needsReviewIds };
}

function isTodayWordMastered(id) {
  var day = state.days[today];
  var answers = day && day.answers ? day.answers : {};
  var record = state.records[id];
  if (record && record.lastSeen === today) return (record.level || 0) > 0;
  if (record && (record.level || 0) > 0 && answers[id] !== false) return true;
  return answers[id] === true;
}

function getFirstPassWrongIds() {
  var answers = state.days[today] && state.days[today].answers ? state.days[today].answers : {};
  var wrongIds = [];
  for (var id in answers) {
    if (Object.prototype.hasOwnProperty.call(answers, id) && answers[id] === false) wrongIds.push(Number(id));
  }
  return wrongIds;
}

function reviewTodayWords() {
  startReview(getTodayIds(), "today");
}

function startWeeklyReview() {
  var source = getWeeklyReviewSource();
  startReview(prioritizeReviewIds(source.ids), "weekly", { sourceThrough: source.through });
}

function reviewWeakWords() {
  startReview(getWeakWordIds(), "weak");
}

function startReview(ids, type, options) {
  var unique = uniqueIds(ids);
  session = mapIdsToWords(unique);
  if (!session.length) return;
  closeSettingsPanel();
  pauseCurrentAudio();
  reviewMode = true;
  learningAutoSpeakArmed = true;
  reviewSession = {
    type: type || "review",
    ids: getIds(session),
    answers: {},
    started: today,
    sourceThrough: options && options.sourceThrough ? options.sourceThrough : ""
  };
  state.activeReview = reviewSession;
  index = 0;
  flipped = false;
  saveState();
  pushPanelHistory("review");
  render();
}

function finishReview() {
  var finished = reviewSession;
  if (finished && finished.type === "weekly" && finished.sourceThrough) {
    state.weeklyReviewThrough = finished.sourceThrough;
    state.lastWeeklyReviewIds = finished.ids.slice();
    state.lastWeeklyReviewDate = today;
  }
  state.activeReview = null;
  reviewSession = null;
  reviewMode = false;
  session = buildSession();
  index = firstUnansweredIndex();
  flipped = false;
  learningAutoSpeakArmed = false;
  clearPanelHistory("review");
  saveState();
}

function cancelReview() {
  pauseCurrentAudio();
  state.activeReview = null;
  reviewSession = null;
  reviewMode = false;
  session = buildSession();
  index = firstUnansweredIndex();
  flipped = false;
  learningAutoSpeakArmed = false;
  clearPanelHistory("review");
  saveState();
  render();
}

function firstUnansweredIndex() {
  var answers = state.days[today] && state.days[today].answers ? state.days[today].answers : {};
  for (var i = 0; i < session.length; i += 1) {
    if (!(session[i].id in answers)) return i;
  }
  return session.length;
}

function firstReviewUnansweredIndex() {
  var answers = reviewSession && reviewSession.answers ? reviewSession.answers : {};
  for (var i = 0; i < session.length; i += 1) {
    if (!(session[i].id in answers)) return i;
  }
  return session.length;
}

function ensureTodayDay() {
  if (!state.days[today]) {
    state.days[today] = { ids: getIds(session), answers: {}, completed: false };
  }
  state.days[today].answers = state.days[today].answers || {};
}

function getTodayIds() {
  return state.days[today] && state.days[today].ids ? state.days[today].ids : [];
}

function renderWeeklyPanel() {
  var source = getWeeklyReviewSource();
  var reviewDue = isWeeklyReviewDue();
  var testDue = isTestDue();
  var weakCount = getWeakWordIds().length;
  if (els.weeklyReviewTitle) els.weeklyReviewTitle.textContent = reviewDue ? "本周该复习了" : "本周小测已准备好";
  if (els.weeklyReviewSummary) {
    els.weeklyReviewSummary.textContent = reviewDue
      ? "这段时间学了 " + source.ids.length + " 个词，先完整复习一遍，再做小测。"
      : "已经完成一轮学习，做一次小测看看掌握得怎么样。";
  }
  toggleHidden(els.weeklyReviewButton, !reviewDue);
  if (els.weakReviewButton) {
    els.weakReviewButton.textContent = weakCount ? "复习没掌握的词 " + weakCount : "暂无没掌握的词";
    els.weakReviewButton.disabled = !weakCount;
    toggleHidden(els.weakReviewButton, !reviewDue);
  }
  if (els.weeklyTestDueButton) {
    toggleHidden(els.weeklyTestDueButton, !testDue);
  }
}

function getWeeklyReviewSource() {
  var days = getCompletedDayKeysAfter(state.weeklyReviewThrough || "");
  var ids = [];
  for (var i = 0; i < days.length; i += 1) {
    var day = state.days[days[i]];
    if (day && day.ids) ids = ids.concat(day.ids);
  }
  return { days: days, ids: uniqueIds(ids), through: days.length ? days[days.length - 1] : "" };
}

function isWeeklyReviewDue() {
  return getWeeklyReviewSource().days.length >= state.settings.testInterval;
}

function getCompletedDayKeysAfter(dateKey) {
  var keys = [];
  for (var key in state.days) {
    if (Object.prototype.hasOwnProperty.call(state.days, key)) {
      if (state.days[key].completed && (!dateKey || key > dateKey)) keys.push(key);
    }
  }
  keys.sort();
  return keys;
}

function getWeakWordIds() {
  var ids = [];
  var wordPool = getSelectedWords();
  for (var i = 0; i < wordPool.length; i += 1) {
    var record = state.records[wordPool[i].id];
    if (record && ((record.level || 0) === 0 || (record.reviewAfter && record.reviewAfter <= today))) ids.push(wordPool[i].id);
  }
  return prioritizeReviewIds(ids);
}

function getSelectedWords() {
  var selected = state.settings.category || DEFAULT_SETTINGS.category;
  if (selected === "all") return WORDS.slice();
  var filtered = [];
  for (var i = 0; i < WORDS.length; i += 1) {
    if (getWordCategory(WORDS[i]) === selected) filtered.push(WORDS[i]);
  }
  return filtered.length ? filtered : WORDS.slice();
}

function getWordCategory(word) {
  return word.category || "基础日常";
}

function prioritizeReviewIds(ids) {
  var unique = uniqueIds(ids);
  unique.sort(function (a, b) {
    var recordA = state.records[a] || { level: 0, reviewAfter: "", lastSeen: "" };
    var recordB = state.records[b] || { level: 0, reviewAfter: "", lastSeen: "" };
    var dueA = recordA.reviewAfter && recordA.reviewAfter <= today ? 0 : 1;
    var dueB = recordB.reviewAfter && recordB.reviewAfter <= today ? 0 : 1;
    if (dueA !== dueB) return dueA - dueB;
    if ((recordA.level || 0) !== (recordB.level || 0)) return (recordA.level || 0) - (recordB.level || 0);
    return String(recordA.lastSeen || "").localeCompare(String(recordB.lastSeen || ""));
  });
  return unique;
}

function uniqueIds(ids) {
  var seen = {};
  var unique = [];
  for (var i = 0; i < ids.length; i += 1) {
    var id = Number(ids[i]);
    if (!id || seen[id]) continue;
    seen[id] = true;
    unique.push(id);
  }
  return unique;
}

function getReviewLabel() {
  if (!reviewSession) return "复习进度";
  if (reviewSession.type === "weekly") return "本周复习";
  if (reviewSession.type === "weak") return "弱项复习";
  if (reviewSession.type === "mistakes") return "错词复习";
  return "今日复习";
}

function objectValues(object) {
  var values = [];
  for (var key in object) {
    if (Object.prototype.hasOwnProperty.call(object, key)) values.push(object[key]);
  }
  return values;
}

function countKnown(values) {
  var count = 0;
  for (var i = 0; i < values.length; i += 1) {
    if (values[i]) count += 1;
  }
  return count;
}

function toggleHidden(element, hidden) {
  if (!element) return;
  element.classList.toggle("hidden", hidden);
}

function registerServiceWorker() {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  }
}
